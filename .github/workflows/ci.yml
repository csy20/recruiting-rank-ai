name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyyaml pytest

      - name: Lint with py_compile
        run: |
          python -m py_compile rank.py serve.py config.py models.py
          python -m py_compile features/extractor.py
          python -m py_compile scoring/ranker.py scoring/explainer.py scoring/skill_graph.py scoring/jd_parser.py
          python -m py_compile utils/nlp_utils.py

      - name: Test with pytest
        run: |
          python -m pytest tests/ -v

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t recruiting-rank-ai .
