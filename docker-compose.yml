version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RR_API_HOST=0.0.0.0
      - RR_API_PORT=8000
      - RR_MODEL_PATH=/app/data/ranker_model.pkl
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
