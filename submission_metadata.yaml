methodology_summary: >
    6-dimension ranking system evaluating technical match (embeddings, vector DB, ranking, ML production),
    semantic relevance (transferable skills), career quality (progression, product vs consulting),
    behavioral signals (response rate, engagement), retention probability (tenure, notice period),
